services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      # Required environment variables:
      # ConnectionStrings__Default=...          (PostgreSQL connection string)
      # Jwt__SigningKey=<at least 32 chars, production-specific>
      - ConnectionStrings__Default=Host=db;Database=invoiceapi;Username=postgres;Password=postgres
      - Jwt__SigningKey=docker-compose-dev-signing-key-change-before-production-use
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: invoiceapi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
